# Evolution API v2 — gateway de WhatsApp do VamoAgendar (ambiente LOCAL de dev).
# A v2 exige PostgreSQL + Redis próprios (não confundir com o Postgres do Supabase).
# Suba com:  docker compose up -d   (dentro de docker/evolution/)
# Config sensível vive no .env ao lado (gitignored); modelo em .env.example.

services:
  evolution-api:
    container_name: evolution_api
    # Fixada na última estável; a tag "latest" aponta para release candidate (2.4.0-rc)
    image: evoapicloud/evolution-api:v2.3.7
    restart: unless-stopped
    ports:
      - "8080:8080"
    env_file:
      - .env
    depends_on:
      - postgres
      - redis
    volumes:
      - evolution_instances:/evolution/instances
    networks:
      - evolution-net

  postgres:
    container_name: evolution_postgres
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_USER: evolution
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-evolution}
      POSTGRES_DB: evolution
    command: postgres -c max_connections=200
    volumes:
      - evolution_postgres:/var/lib/postgresql/data
    networks:
      - evolution-net

  redis:
    container_name: evolution_redis
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - evolution_redis:/data
    networks:
      - evolution-net

volumes:
  evolution_instances:
  evolution_postgres:
  evolution_redis:

networks:
  evolution-net:
    driver: bridge
